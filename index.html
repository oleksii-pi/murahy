<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ant Colony RTS</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="game-shell">
      <canvas id="game" aria-label="Ant colony strategy game"></canvas>

      <section id="top-hud" class="hud-strip" aria-label="Colony status">
        <div class="hud-group">
          <span class="label">Protein</span>
          <strong id="protein">0</strong>
        </div>
        <div class="hud-group">
          <span class="label">Sand</span>
          <strong id="sand">0</strong>
        </div>
        <div class="hud-group">
          <span class="label">Sticks</span>
          <strong id="sticks">0</strong>
        </div>
        <div class="hud-group">
          <span class="label">Workers</span>
          <strong id="workers">0</strong>
        </div>
        <div class="hud-group">
          <span class="label">Guards</span>
          <strong id="fighters">0</strong>
        </div>
        <div class="hud-group">
          <span class="label">Larvae</span>
          <strong id="larvae">0</strong>
        </div>
        <div class="hud-group">
          <span class="label">Queen</span>
          <strong id="queen-status">Alive</strong>
        </div>
      </section>

      <section id="selection-panel" class="hud-panel" aria-label="Selection">
        <div class="panel-title">Selection</div>
        <div id="selection-summary">0 units</div>
        <div id="selection-detail"></div>
      </section>

      <section id="action-panel" class="hud-panel" aria-label="Actions">
        <div class="panel-title">Actions</div>
        <div id="action-buttons"></div>
      </section>

      <section id="message-log" class="hud-panel" aria-label="Events"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
